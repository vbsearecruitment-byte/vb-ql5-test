      box-shadow:

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      overflow: hidden;

    /* Barra di lettura parametro: mostra in grande l'ultimo parametro toccato
       e il suo valore corrente, così il candidato vede sempre cosa sta regolando
       (gain, HPF, EQ, send level...). È il feedback che sul QL5 reale dà lo schermo. */
    #paramReadout {
      display: flex;
      align-items: baseline;
      gap: 12px;
      font-family: 'Courier New', monospace;
      opacity: 0.35;
      transition: opacity 140ms ease;
    }
    #paramReadout.active { opacity: 1; }
    #paramReadoutContext { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #6b7280; }
    #paramReadoutLabel { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #94a3b8; font-weight: 700; }
    #paramReadoutValue { font-size: 20px; font-weight: 900; color: #22d3ee; line-height: 1; letter-spacing: 0.02em; }
    #paramReadoutValue.warn { color: #fbbf24; }

    .focus-target {
      cursor: pointer;
      transition: box-shadow 120ms ease, border-color 120ms ease;
    }

    .focus-active {
      border-color: rgba(34,211,238,0.75) !important;
      box-shadow: inset 0 0 10px rgba(34,211,238,0.14), 0 0 8px rgba(34,211,238,0.22) !important;
    }

    /* Lente di ingrandimento testo: mostra in grande l'etichetta del controllo
       sotto il mouse o con focus da tastiera, per i tasti/manopole troppo
       piccoli da leggere alla scala reale della console. */
    .hover-magnifier {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      background: rgba(8, 10, 14, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.4);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'Courier New', monospace;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 100ms ease, transform 100ms ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      max-width: 240px;
    }
    .hover-magnifier.visible { opacity: 1; transform: translateY(0); }
    .hover-magnifier-category {
      display: block;
      font-size: 8px;
      letter-spacing: 0.14em;
      color: #22d3ee;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .hover-magnifier-text {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
    }

<script>

  const sceneDefaults = ['Init', 'Show Start', 'Vocal Focus', 'Band Balance', 'Guest Mic', 'Finale'];
  const practicalAssessmentTasks = [
    { id: 'setLeadVocalGain', title: 'Set Lead Vocal Gain to +6 dB', type: 'gainValue', channelId: 1, gain: 6, toleranceDb: 0.5, timeLimit: 90,
      instruction: 'Select channel 1 (Lead Vocal) and set the input GAIN to +6 dB using the Selected Channel section.' },

    { id: 'cueLeadVocal', title: 'Cue (Solo) the Lead Vocal', type: 'cueChannel', channelId: 1, timeLimit: 60,
      instruction: 'Activate CUE on channel 1 (Lead Vocal) to listen to it in solo (PFL).' },
    { id: 'sendVocalMonitorLevel', title: 'Send Lead Vocal to MIX 1 (monitor) at -10 dB', type: 'sendLevel', channelId: 1, busId: 1, targetDb: -10, toleranceDb: 1, timeLimit: 180,
      instruction: 'Open the MIX BUS tab, tap MIX 1 to enter SENDS ON FADER, then raise channel 1 fader to -10 dB and switch its ON key on.' },
    { id: 'storeVocalFocusScene', title: 'Store Scene 003 (Vocal Focus)', type: 'sceneStore', sceneId: 3, timeLimit: 90,
      instruction: 'Select Scene 003 (Vocal Focus) and press STORE to save the current console state.' },
    { id: 'recallInitScene', title: 'Recall Scene 001 (Init)', type: 'sceneRecall', sceneId: 1, timeLimit: 75,
      instruction: 'Select Scene 001 (Init) and press RECALL to restore that console state.' }
  ];
  const assessmentState = {
    selectedChannel: 1,
    activeTab: 'SELECTED_CH',
    selectedScene: 1,
    currentTask: null,
    mistakes: 0,
    unnecessaryActions: 0,
    actionLog: [],
    channels: {},
    scenes: [],
    selectedMixBus: null,
    sendsOnFaderActive: false,
    inputPatch: {},
    outputPatch: {},
    master: {
      L: { on: true, faderDb: 0, faderTop: 20 },
      R: { on: true, faderDb: 0, faderTop: 20 }
    },
    focus: {
      area: null,
      parameter: null,
      channelId: null,
      band: null,
      processor: null,
      busId: null
    },
    userDefinedKeys: {},
    candidate: null,
    assessment: {
      started: false,
      completed: false,
      submitted: false,
      startedAt: null,
      completedAt: null,
      taskIndex: -1,
      taskResults: [],
      timeRemaining: 0,
      finalScore: 0,
      verdict: 'NOT STARTED'
    }
  };
  window.assessmentState = assessmentState;
  let assessmentTimerId = null;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function faderTopToDb(top) {
    return Math.round((10 - (Number(top) / 100) * 70) * 10) / 10;
  }

  function dbToFaderTop(db) {
    return clamp(((10 - db) / 70) * 100, 0, 100);
  }

  // Il cursore ha un'altezza fissa (48px canali, 80px master): posizionarlo con
  // top:100% lo fa sporgere oltre il fondo del binario. Qui il valore logico
  // 0-100 viene convertito nello spazio di corsa reale (binario - altezza cursore),
  // così il cursore resta sempre dentro il binario, ai due estremi compresi.
  function renderFaderTop(cap, logicalTop) {
    if (!cap) return;
    const track = cap.parentElement;
    const trackHeight = track ? track.offsetHeight : 0;
    const capHeight = cap.offsetHeight;
    const insetPercent = trackHeight > 0 ? (capHeight / trackHeight) * 100 : 0;
    const safeTop = (clamp(logicalTop, 0, 100) / 100) * (100 - insetPercent);
    cap.style.top = `${safeTop}%`;
  }

  function nowStamp() {
    return new Date().toISOString();
  }

  function defaultEq() {
    return {
      low: { frequency: 100, gain: 0, q: 0.7 },
      lowMid: { frequency: 350, gain: 0, q: 1 },
      highMid: { frequency: 2500, gain: 0, q: 1 },
      high: { frequency: 10000, gain: 0, q: 0.7 }
    };
  }

  function initState() {
    for (let channelId = 1; channelId <= 32; channelId++) {
      const cap = document.querySelector(`[data-action="channel-fader"][data-channel-id="${channelId}"]`);
      const top = parseFloat(cap?.style.top || 50);
      assessmentState.channels[channelId] = {
        id: channelId,
        name: channelNames[(channelId - 1) % channelNames.length],
        gain: channelId === 1 ? 3 : 0,
        pan: 0,
        hpfEnabled: false,
        hpfFrequency: 80,
        eq: defaultEq(),
        dyn1: { type: 'gate', enabled: false, threshold: -50 },
        dyn2: { type: 'compressor', enabled: false, threshold: -20, ratio: 3 },
        gateEnabled: false,
        gateThreshold: -50,
        compressorEnabled: false,
        compressorThreshold: -20,
        ratio: 3,
        faderDb: faderTopToDb(top),
        faderTop: top,
        cue: false,
        on: true,
        routing: {},
        sends: Object.fromEntries(Array.from({ length: 16 }, (_, busIndex) => [busIndex + 1, {
          on: false,
          levelDb: faderTopToDb(82),
          faderTop: 82,
          prePost: 'POST'
        }]))
      };
      assessmentState.inputPatch[channelId] = {
        sourceType: channelId <= 32 ? 'DANTE' : 'INPUT',
        portId: channelId,
        label: channelId <= 32 ? `DANTE ${channelId}` : `INPUT ${channelId}`
      };
    }
    for (let busId = 1; busId <= 16; busId++) {
      assessmentState.outputPatch[`MIX${busId}`] = {
        type: 'MIX',
        busId,
        destinationType: 'OMNI',
        portId: busId,
        label: `OMNI ${busId}`
      };
    }
    for (let keyId = 1; keyId <= 12; keyId++) {
      assessmentState.userDefinedKeys[keyId] = { active: false };
    }
    assessmentState.scenes = sceneDefaults.map((name, index) => ({
      id: index + 1,
      number: String(index).padStart(3, '0'),
      name,
      storedAt: null,
      snapshot: null
    }));
  }

  function cloneConsoleSnapshot() {
    return JSON.parse(JSON.stringify({
      channels: assessmentState.channels,
      selectedChannel: assessmentState.selectedChannel,
      master: assessmentState.master,
      inputPatch: assessmentState.inputPatch,
      outputPatch: assessmentState.outputPatch,
      selectedMixBus: assessmentState.selectedMixBus,
      sendsOnFaderActive: assessmentState.sendsOnFaderActive
    }));
  }

  function recordAction(type, detail = {}) {
    const entry = {
      timestamp: nowStamp(),
      type,
      detail,
      selectedChannel: assessmentState.selectedChannel
    };
    assessmentState.actionLog.push(entry);
    if (assessmentState.currentTask && !['taskStart', 'taskComplete', 'taskFail', 'assessmentStart', 'assessmentComplete', 'reportExport'].includes(type) && !isActionRelevant(type, detail, assessmentState.currentTask)) {
      assessmentState.unnecessaryActions += 1;
      entry.unnecessary = true;
    }
    if (assessmentState.assessment.started && !assessmentState.assessment.completed && assessmentState.currentTask && !entry.unnecessary && !['taskStart', 'taskComplete', 'taskFail'].includes(type)) {
      checkAssessmentProgress();
    }
    return entry;
  }

  // Task-plugin registry: ogni tipo di task è un oggetto autonomo con tre
  // metodi (isRelevant/evaluate/hasRequiredAction). Aggiungere un tipo di task
  // significa aggiungere una voce qui, non toccare tre funzioni separate.
  const taskPlugins = {
    faderDelta: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (type === 'faderMove' && detail.channelId === task.channelId),
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const delta = channel.faderDb - task.initialFaderDb;
        const passed = Math.abs(delta - task.deltaDb) <= task.toleranceDb;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, delta };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'selectChannel' && action.detail.channelId === task.channelId) && actions.some(action => action.type === 'faderMove' && action.detail.channelId === task.channelId)
    },
    routing: {
      isRelevant: (type) => type === 'selectChannel' || type === 'routeToggle' || type === 'mixBusSelect' || type === 'sendOnToggle' || type === 'sendFaderMove',
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const passed = channel.routing[task.busId] === true;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'selectChannel' && action.detail.channelId === task.channelId) && actions.some(action => (action.type === 'routeToggle' || action.type === 'sendOnToggle') && action.detail.channelId === task.channelId && action.detail.busId === task.busId && action.detail.active === true)
    },
    sceneRecall: {
      isRelevant: (type, detail, task) => type === 'sceneSelect' || (type === 'sceneRecall' && detail.sceneId === task.sceneId),
      evaluate: (task, countMistake) => {
        const recalled = actionsSinceTaskStart().some(action => action.type === 'sceneRecall' && action.detail.sceneId === task.sceneId && action.detail.hadSnapshot);
        const passed = recalled && assessmentState.selectedScene === task.sceneId;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'sceneRecall' && action.detail.sceneId === task.sceneId)
    },
    hpfEnable: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (type === 'processingToggle' && detail.channelId === task.channelId && detail.flag === 'hpfEnabled'),
      evaluate: (task, countMistake) => {
        const passed = assessmentState.channels[task.channelId].hpfEnabled === true;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'selectChannel' && action.detail.channelId === task.channelId) && actions.some(action => action.type === 'processingToggle' && action.detail.channelId === task.channelId && action.detail.flag === 'hpfEnabled' && action.detail.active === true)
    },
    hpfFrequency: {
      isRelevant: (type, detail, task) => {
        if (type === 'selectChannel') return true;
        if (type === 'processingToggle') return detail.channelId === task.channelId && detail.flag === 'hpfEnabled';
        if (type === 'knobAdjust') return detail.channelId === task.channelId && detail.knobType === 'hpfFrequency';
        if (type === 'processingChange') return detail.channelId === task.channelId && detail.field === 'hpfFrequency';
        // Cliccare la casella a schermo per puntare la Touch and Turn è il workflow
        // reale, non un tentativo a vuoto: va riconosciuto come relevant.
        if (type === 'focusChange') return detail.channelId === task.channelId && detail.parameter === 'hpfFrequency';
        return false;
      },
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const passed = channel.hpfEnabled === true && Math.abs(channel.hpfFrequency - task.targetHz) <= task.toleranceHz;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, value: channel.hpfFrequency };
      },
      hasRequiredAction: (actions, task) => {
        const enabled = actions.some(action => action.type === 'processingToggle' && action.detail.channelId === task.channelId && action.detail.flag === 'hpfEnabled' && action.detail.active === true);
        const adjusted = actions.some(action => action.detail.channelId === task.channelId && ((action.type === 'knobAdjust' && action.detail.knobType === 'hpfFrequency') || (action.type === 'processingChange' && action.detail.field === 'hpfFrequency')));
        return enabled && adjusted;
      }
    },
    eqBand: {
      isRelevant: (type, detail, task) => {
        if (type === 'selectChannel') return true;
        if (type === 'eqBandSelect') return detail.channelId === task.channelId && detail.band === task.band;
        // selectEqBand() chiama internamente setFocus(), che registra anche un
        // 'focusChange': va riconosciuto come relevant, non è un click a caso.
        if (type === 'focusChange') return detail.area === 'eq' && detail.channelId === task.channelId && detail.band === task.band;
        if (type === 'eqChange') return detail.channelId === task.channelId && detail.band === task.band && detail.field === 'gain';
        if (type === 'knobAdjust') return detail.channelId === task.channelId && detail.knobType === 'eq' && detail.band === task.band && detail.parameter === 'gain';
        return false;
      },
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const passed = Math.abs(channel.eq[task.band].gain - task.gain) <= task.toleranceDb;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, value: channel.eq[task.band].gain };
      },
      hasRequiredAction: (actions, task) => {
        const bandSelected = actions.some(action => action.type === 'eqBandSelect' && action.detail.channelId === task.channelId && action.detail.band === task.band);
        const adjusted = actions.some(action => action.detail.channelId === task.channelId && ((action.type === 'eqChange' && action.detail.band === task.band && action.detail.field === 'gain') || (action.type === 'knobAdjust' && action.detail.knobType === 'eq' && action.detail.band === task.band && action.detail.parameter === 'gain')));
        return bandSelected && adjusted;
      }
    },
    sendLevel: {
      isRelevant: (type, detail, task) => {
        if (type === 'selectChannel' || type === 'mixBusSelect') return true;
        if (type === 'sendFaderMove' || type === 'sendOnToggle' || type === 'routeToggle') return detail.channelId === task.channelId && detail.busId === task.busId;
        return false;
      },
      evaluate: (task, countMistake) => {
        const send = channelSend(task.channelId, task.busId);
        const passed = Boolean(send && send.on && Math.abs(send.levelDb - task.targetDb) <= task.toleranceDb);
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, value: send?.levelDb };
      },
      hasRequiredAction: (actions, task) => {
        const busSelected = actions.some(action => action.type === 'mixBusSelect' && action.detail.busId === task.busId);
        const faderMoved = actions.some(action => action.type === 'sendFaderMove' && action.detail.channelId === task.channelId && action.detail.busId === task.busId);
        return busSelected && faderMoved;
      }
    },
    sceneStore: {
      isRelevant: (type, detail, task) => type === 'sceneSelect' || (type === 'sceneStore' && detail.sceneId === task.sceneId),
      evaluate: (task, countMistake) => {
        const scene = assessmentState.scenes.find(item => item.id === task.sceneId);
        const passed = Boolean(scene && scene.storedAt && scene.snapshot);
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'sceneStore' && action.detail.sceneId === task.sceneId)
    },
    compressorThreshold: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (['processingChange', 'knobAdjust', 'processingToggle'].includes(type) && detail.channelId === task.channelId) || (type === 'focusChange' && detail.channelId === task.channelId && detail.parameter === 'compressorThreshold'),
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const passed = Math.abs(channel.compressorThreshold - task.threshold) <= task.toleranceDb;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, value: channel.compressorThreshold };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.detail.channelId === task.channelId && (action.type === 'processingChange' || action.type === 'knobAdjust'))
    },
    muteChannel: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (type === 'onToggle' && detail.channelId === task.channelId),
      evaluate: (task, countMistake) => {
        const passed = assessmentState.channels[task.channelId].on === false;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'onToggle' && action.detail.channelId === task.channelId && action.detail.active === false)
    },
    gainValue: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (['processingChange', 'knobAdjust'].includes(type) && detail.channelId === task.channelId) || (type === 'focusChange' && detail.channelId === task.channelId && detail.parameter === 'gain'),
      evaluate: (task, countMistake) => {
        const channel = assessmentState.channels[task.channelId];
        const passed = Math.abs(channel.gain - task.gain) <= task.toleranceDb;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed, value: channel.gain };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.detail.channelId === task.channelId && (action.type === 'processingChange' || action.type === 'knobAdjust'))
    },
    cueChannel: {
      isRelevant: (type, detail, task) => type === 'selectChannel' || (type === 'cueToggle' && detail.channelId === task.channelId),
      evaluate: (task, countMistake) => {
        const passed = assessmentState.channels[task.channelId].cue === true;
        if (!passed && countMistake) assessmentState.mistakes += 1;
        return { passed };
      },
      hasRequiredAction: (actions, task) => actions.some(action => action.type === 'cueToggle' && action.detail.channelId === task.channelId && action.detail.active === true)
    }
  };

  function isActionRelevant(type, detail, task) {
    return taskPlugins[task.type].isRelevant(type, detail, task);
  }

  function evaluateCurrentTask(countMistake = true) {
    const task = assessmentState.currentTask;
    if (!task) return { passed: false, reason: 'No active assessment task.' };
    return taskPlugins[task.type].evaluate(task, countMistake);
  }
  window.evaluateCurrentTask = evaluateCurrentTask;

  function totalAssessmentTimeUsed() {
    return assessmentState.assessment.taskResults.reduce((sum, task) => sum + task.timeUsed, 0);
  }

  function actionsSinceTaskStart() {
    const taskStartedAt = assessmentState.currentTask?.startedAt;
    if (!taskStartedAt) return [];
    return assessmentState.actionLog.filter(action => action.timestamp >= taskStartedAt);
  }

  function taskHasRequiredAction(task) {
    return taskPlugins[task.type].hasRequiredAction(actionsSinceTaskStart(), task);
  }

  function assessmentValidation() {
    const result = evaluateCurrentTask(false);
    const task = assessmentState.currentTask;
    const requiredActionDone = taskHasRequiredAction(task);
    return { ...result, passed: Boolean(result?.passed && requiredActionDone), requiredActionDone };
  }

  function scoreAssessment() {
    const passed = assessmentState.assessment.taskResults.filter(task => task.passed).length;
    const base = (passed / practicalAssessmentTasks.length) * 100;
    const penalty = assessmentState.mistakes * 4 + assessmentState.unnecessaryActions * 2;
    const finalScore = clamp(Math.round(base - penalty), 0, 100);
    assessmentState.assessment.finalScore = finalScore;
    assessmentState.assessment.verdict = finalScore >= 80 ? 'PASS' : finalScore >= 60 ? 'BORDERLINE' : 'FAIL';
  }

  function stopAssessmentTimer() {
    if (assessmentTimerId) clearInterval(assessmentTimerId);
    assessmentTimerId = null;
  }

  function startAssessmentTimer() {
    stopAssessmentTimer();
    assessmentTimerId = setInterval(() => {
      if (!assessmentState.currentTask || assessmentState.assessment.completed) {
        stopAssessmentTimer();
        return;
      }
      const elapsed = Math.floor((Date.now() - assessmentState.currentTask.startedMs) / 1000);
      assessmentState.assessment.timeRemaining = clamp(assessmentState.currentTask.timeLimit - elapsed, 0, assessmentState.currentTask.timeLimit);
      renderControlPanel();
      if (assessmentState.assessment.timeRemaining <= 0) finishCurrentTask(false, 'TIMEOUT');
    }, 1000);
  }

  function beginAssessmentTask(index) {
    if (index >= practicalAssessmentTasks.length) {
      completeAssessment();
      return;
    }
    const template = practicalAssessmentTasks[index];
    assessmentState.assessment.taskIndex = index;
    assessmentState.currentTask = {
      ...template,
      startedAt: nowStamp(),
      startedMs: Date.now()
    };
    if (template.type === 'faderDelta') {
      assessmentState.currentTask.initialFaderDb = assessmentState.channels[template.channelId].faderDb;
    }
    assessmentState.assessment.timeRemaining = template.timeLimit;
    recordAction('taskStart', { taskId: template.id, title: template.title });
    startAssessmentTimer();
    renderControlPanel();
  }

  function renderControlPanel() {
    const el = document.getElementById('branding-instruction-text');

    if (!session.started) {
      el.innerHTML = `

            <strong>Every action you perform is recorded</strong> - not just the final result, but the exact sequence of buttons and controls you use. Pressing the wrong control, or finding the right one only after several attempts, is tracked and will affect your final evaluation.

            <div style="background:#fff;border:1px solid #d9dee8;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#667085;text-transform:uppercase;">Clean</div><div style="font-size:15px;font-weight:850;color:#146c2e;">${report.cleanTasks}</div></div>
            <div style="background:#fff;border:1px solid #d9dee8;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#667085;text-transform:uppercase;">Mistakes</div><div style="font-size:15px;font-weight:850;color:#b42318;">${report.mistakes}</div></div>
            <div style="background:#fff;border:1px solid #d9dee8;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#667085;text-transform:uppercase;">Time</div><div style="font-size:15px;font-weight:850;color:#143264;">${report.timeUsedSeconds}s</div></div>

          <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
            ${report.taskResults.map((task, index) => `

                <div style="color:#172033;">${String(index + 1).padStart(2, '0')}. ${task.title}</div>

    el.innerHTML = `

          <div style="font-size:22px;font-weight:850;color:#fff;background:${session.timeRemaining <= 10 ? '#b42318' : '#bea064'};padding:4px 14px;border-radius:20px;">${session.timeRemaining}s</div>
        </div>
        <div style="background:#fff;border:1px solid #d9dee8;border-left:5px solid #bea064;border-radius:0 8px 8px 0;box-shadow:0 4px 16px rgba(16,24,40,.06);padding:16px;margin-bottom:16px;">
          <div style="font-size:21px;font-weight:850;color:#bea064;line-height:1.3;">${task?.title || 'Preparing next task...'}</div>

        </div>

          <div style="background:#fff;border:1px solid #d9dee8;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#667085;text-transform:uppercase;">Correct</div><div style="font-size:16px;font-weight:850;color:#146c2e;">${completed}</div></div>
          <div style="background:#fff;border:1px solid #d9dee8;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#667085;text-transform:uppercase;">Wrong</div><div style="font-size:16px;font-weight:850;color:#b42318;">${assessmentState.mistakes}</div></div>
        </div>
        <button data-assessment-action="check-task" style="width:100%;background:#143264;color:#fff;font-weight:850;font-size:14px;padding:13px;border:0;border-radius:8px;cursor:pointer;">Check Current Task</button>
      </div>

    bindControlPanel();
  }

  function bindControlPanel() {
    const panel = document.getElementById('branding-instruction-text');
    if (!panel) return;
    const startBtn = panel.querySelector('[data-assessment-action="start-test"]');
    if (startBtn) startBtn.addEventListener('click', () => startCandidateAssessment());
    const checkBtn = panel.querySelector('[data-assessment-action="check-task"]');
    if (checkBtn) checkBtn.addEventListener('click', () => {
      const validation = assessmentValidation();
      if (validation.passed) finishCurrentTask(true, 'COMPLETED');
      else finishCurrentTask(false, validation.requiredActionDone ? 'INCORRECT RESULT' : 'REQUIRED ACTION NOT PERFORMED');
    });
    const submitBtn = panel.querySelector('[data-assessment-action="submit-application"]');
    if (submitBtn) submitBtn.addEventListener('click', submitTestResults);
  }

  function finishCurrentTask(passed, reason = '') {
    if (!assessmentState.currentTask || assessmentState.currentTask.finished) return;
    assessmentState.currentTask.finished = true;
    const task = assessmentState.currentTask;
    const timeUsed = clamp(Math.round((Date.now() - task.startedMs) / 1000), 0, task.timeLimit);
    const retryCount = actionsSinceTaskStart().filter(action => action.unnecessary).length;
    if (!passed) assessmentState.mistakes += 1;
    assessmentState.assessment.taskResults.push({
      id: task.id,
      title: task.title,
      passed,
      reason,
      timeUsed,
      timeLimit: task.timeLimit,
      retryCount,
      clean: passed && retryCount === 0,
      completedAt: nowStamp()
    });
    recordAction(passed ? 'taskComplete' : 'taskFail', { taskId: task.id, reason, timeUsed });
    stopAssessmentTimer();
    scoreAssessment();
    setTimeout(() => beginAssessmentTask(assessmentState.assessment.taskIndex + 1), 550);
    renderControlPanel();
  }

  function checkAssessmentProgress() {
    if (!assessmentState.assessment.started || assessmentState.assessment.completed || !assessmentState.currentTask) return;
    const validation = assessmentValidation();
    if (validation.passed) finishCurrentTask(true, 'COMPLETED');
  }

  function startCandidateAssessment() {
    // Identità del candidato raccolta a monte nel form scritto (VB_TECHNICAL_SCREENING_FORM).
    // Questo schermo serve solo per operare la console, non per inserire dati.
    assessmentState.mistakes = 0;
    assessmentState.unnecessaryActions = 0;
    assessmentState.actionLog = [];
    assessmentState.assessment = {
      started: true,
      completed: false,
      submitted: false,
      startedAt: nowStamp(),
      completedAt: null,
      taskIndex: -1,
      taskResults: [],
      timeRemaining: 0,
      finalScore: 0,
      verdict: 'IN PROGRESS'
    };
    // Scena 001 "Init" pre-programmata: rappresenta lo stato di partenza della console,
    // così il task di Recall ha davvero qualcosa da richiamare.
    const initScene = assessmentState.scenes.find(scene => scene.id === 1);
    initScene.snapshot = cloneConsoleSnapshot();
    initScene.storedAt = nowStamp();
    recordAction('assessmentStart', {});
    beginAssessmentTask(0);
  }

  function completeAssessment() {
    stopAssessmentTimer();
    assessmentState.currentTask = null;
    assessmentState.assessment.completed = true;
    assessmentState.assessment.completedAt = nowStamp();
    scoreAssessment();
    recordAction('assessmentComplete', {
      finalScore: assessmentState.assessment.finalScore,
      verdict: assessmentState.assessment.verdict
    });
    renderControlPanel();
    switchTab('SELECTED_CH');
  }

  function recruiterReport() {
    const passed = assessmentState.assessment.taskResults.filter(task => task.passed).length;
    const cleanTasks = assessmentState.assessment.taskResults.filter(task => task.clean).length;
    return {
      // Nessuna identità candidato qui: è raccolta nel form scritto (VB_TECHNICAL_SCREENING_FORM).
      // testStartedAt permette di abbinare manualmente questo report a quella submission per data/ora.
      testStartedAt: assessmentState.assessment.startedAt,
      date: new Date().toISOString(),
      tasksCompleted: `${passed}/${practicalAssessmentTasks.length}`,
      cleanTasks: `${cleanTasks}/${practicalAssessmentTasks.length}`,
      mistakes: assessmentState.mistakes,
      unnecessaryActions: assessmentState.unnecessaryActions,
      timeUsedSeconds: totalAssessmentTimeUsed(),
      finalScore: assessmentState.assessment.finalScore,
      verdict: assessmentState.assessment.verdict,
      taskResults: assessmentState.assessment.taskResults,
      actionLog: assessmentState.actionLog
    };
  }

  // URL del Google Apps Script pubblicato come Web App (vedi doPost lato script
  // in google-apps-script-backend.gs): salva su Google Sheet e manda la mail.
  const SUBMISSION_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzmedZVsI_6_sj91QcPBW0_Nwb_sJO5mfczVO0_7gdDXuC-TYmUvR1-KHFr9kPt25L-/exec';

  function submitTestResults() {
    const report = recruiterReport();
    if (SUBMISSION_ENDPOINT) {
      fetch(SUBMISSION_ENDPOINT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(report)
      }).catch(() => {});
    }
    assessmentState.assessment.submitted = true;
    recordAction('applicationSubmitted', {});
    renderControlPanel();
  }

  function exportAssessmentJson() {
    const blob = new Blob([JSON.stringify(recruiterReport(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `vb-assessment-${Date.now()}.json`;
    link.click();
    URL.revokeObjectURL(url);

  function updateClock() {
    const now = new Date();
    const timeStr = now.toTimeString().split(' ')[0];
    const clockEl = document.getElementById('clock');
    if(clockEl) clockEl.textContent = timeStr;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function selectedChannel() {
    return assessmentState.channels[assessmentState.selectedChannel];
  }

  function channelSend(channelId, busId = assessmentState.selectedMixBus) {
    return assessmentState.channels[channelId]?.sends?.[busId] || null;
  }

  function currentFaderState(channelId) {
    const channel = assessmentState.channels[channelId];
    const send = assessmentState.sendsOnFaderActive ? channelSend(channelId) : null;
    if (send) return { faderDb: send.levelDb, faderTop: send.faderTop };
    return { faderDb: channel.faderDb, faderTop: channel.faderTop };
  }

  function eqPath(channel) {
    const bands = [channel.eq.low, channel.eq.lowMid, channel.eq.highMid, channel.eq.high];
    const points = bands.map((band, index) => {
      const x = 35 + index * 75;
      const y = clamp(75 - band.gain * 4, 18, 132);
      return { x, y };
    });
    return `M 0 75 C ${points[0].x} ${points[0].y}, ${points[1].x} ${points[1].y}, 150 ${points[1].y} S ${points[2].x} ${points[2].y}, 220 ${points[2].y} S ${points[3].x} ${points[3].y}, 300 75`;
  }

  function focusMatches(area, parameter, band = null, channelId = assessmentState.selectedChannel) {
    const focus = assessmentState.focus;
    return focus.area === area && focus.parameter === parameter && focus.band === band && focus.channelId === channelId;
  }

  function focusClass(area, parameter, band = null) {
    return focusMatches(area, parameter, band) ? 'focus-active' : '';
  }

  function setFocus(focusUpdate) {
    assessmentState.focus = {
      area: focusUpdate.area || null,
      parameter: focusUpdate.parameter || null,
      channelId: focusUpdate.channelId ? Number(focusUpdate.channelId) : assessmentState.selectedChannel,
      band: focusUpdate.band || null,
      processor: focusUpdate.processor || null,
      busId: focusUpdate.busId ? Number(focusUpdate.busId) : null
    };
    recordAction('focusChange', { ...assessmentState.focus });
    applyFocusHighlight();
  }

  function applyFocusHighlight() {
    document.querySelectorAll('[data-focus-param]').forEach(element => {
      const candidate = focusFromElement(element);
      const active = focusMatches(candidate.area, candidate.parameter, candidate.band, Number(candidate.channelId));
      element.classList.toggle('focus-active', active);
    });
    updateEqBandButtons();
  }

  function focusFromElement(element) {
    return {
      area: element.dataset.focusArea,
      parameter: element.dataset.focusParam,
      channelId: element.dataset.focusChannel || assessmentState.selectedChannel,
      band: element.dataset.focusBand || null,
      processor: element.dataset.focusProcessor || null,
      busId: element.dataset.focusBus || null
    };
  }

  function activeTouchTarget() {
    const focus = assessmentState.focus;
    if (focus.area && focus.parameter) return { ...focus };
    return {
      area: 'channel',
      parameter: 'gain',
      channelId: assessmentState.selectedChannel,
      band: null,
      processor: null,
      busId: null
    };
  }

  // Dispatcher unico: tabella "come rispondere a un delta di rotazione" per
  // ogni parametro, usata sia da Touch and Turn sia da ogni encoder fisico
  // (vedi .knob handler più sotto) sia dagli input numerici/slider dello
  // schermo (updateChannelField). Prima questa logica (sensibilità + limiti)
  // era scritta due volte, con rischio di disallineamento tra i due controlli.
  const parameterHandlers = {
    gain: {
      computeNext: (current, delta) => Math.round(current + delta / 4),
      clamp: value => clamp(value, -18, 60),
      write: (channel, value) => { channel.gain = value; }
    },
    pan: {
      computeNext: (current, delta) => Math.round(current + delta / 3),
      clamp: value => clamp(value, -100, 100),
      write: (channel, value) => { channel.pan = value; }
    },
    hpfFrequency: {
      computeNext: (current, delta) => Math.round(current + delta),
      clamp: value => clamp(value, 20, 200),
      write: (channel, value) => { channel.hpfFrequency = value; }
    },
    gateThreshold: {
      computeNext: (current, delta) => Math.round(current + delta / 2),
      clamp: value => clamp(value, -80, 0),
      write: (channel, value) => { channel.gateThreshold = value; channel.dyn1.threshold = value; }
    },
    compressorThreshold: {
      computeNext: (current, delta) => Math.round(current + delta / 2),
      clamp: value => clamp(value, -60, 0),
      write: (channel, value) => { channel.compressorThreshold = value; channel.dyn2.threshold = value; }
    },
    ratio: {
      computeNext: (current, delta) => Math.round((current + delta / 12) * 10) / 10,
      clamp: value => clamp(value, 1, 10),
      write: (channel, value) => { channel.ratio = value; channel.dyn2.ratio = value; }
    }
  };

  const eqParameterHandlers = {
    frequency: {
      computeNext: (current, delta) => Math.round(current + delta * 8),
      clamp: value => clamp(value, 20, 20000)
    },
    gain: {
      computeNext: (current, delta) => Math.round((current + delta / 8) * 10) / 10,
      clamp: value => clamp(value, -18, 18)
    },
    q: {
      computeNext: (current, delta) => Math.round((current + delta / 80) * 10) / 10,
      clamp: value => clamp(value, 0.1, 10)
    }
  };

  function applyParameterDelta(parameterKey, channel, delta, baseValue = channel[parameterKey]) {
    const handler = parameterHandlers[parameterKey];
    if (!handler) return baseValue;
    const next = handler.clamp(handler.computeNext(baseValue, delta));
    handler.write(channel, next);
    return next;
  }

  function applyEqParameterDelta(parameter, band, channel, delta, baseValue = channel.eq[band][parameter]) {
    const handler = eqParameterHandlers[parameter];
    if (!handler) return baseValue;
    const next = handler.clamp(handler.computeNext(baseValue, delta));
    channel.eq[band][parameter] = next;
    return next;
  }

  function adjustFocusedParameter(delta) {
    const target = activeTouchTarget();
    const channel = assessmentState.channels[target.channelId] || selectedChannel();
    if (target.area === 'eq' && target.band && channel.eq[target.band]) {
      const value = applyEqParameterDelta(target.parameter, target.band, channel, delta);
      showParameterReadout({ area: 'eq', parameter: target.parameter, band: target.band, channelId: channel.id });
      return { target, value };
    }
    const value = applyParameterDelta(target.parameter, channel, delta);
    showParameterReadout({ area: 'channel', parameter: target.parameter, channelId: channel.id });
    return { target, value };
  }

  // --- Barra di lettura parametro (feedback valore sempre visibile) ---
  const BAND_LABELS = { low: 'LOW', lowMid: 'LOW-MID', highMid: 'HIGH-MID', high: 'HIGH' };

  function paramReadoutData(entry) {
    const channel = assessmentState.channels[entry.channelId] || selectedChannel();
    const context = `CH ${String(channel.id).padStart(2, '0')} ${channel.name}`;
    if (entry.area === 'eq') {
      const band = channel.eq[entry.band];
      const bandName = BAND_LABELS[entry.band] || entry.band;
      if (entry.parameter === 'gain') return { context, label: `EQ ${bandName} GAIN`, value: `${band.gain > 0 ? '+' : ''}${band.gain.toFixed(1)} dB`, warn: band.gain !== 0 };
      if (entry.parameter === 'frequency') return { context, label: `EQ ${bandName} FREQ`, value: `${band.frequency} Hz` };
      if (entry.parameter === 'q') return { context, label: `EQ ${bandName} Q`, value: band.q.toFixed(1) };
    }
    if (entry.parameter === 'gain') return { context, label: 'HA / GAIN', value: `${channel.gain > 0 ? '+' : ''}${channel.gain} dB` };
    if (entry.parameter === 'hpfFrequency') return { context, label: 'HPF FREQUENCY', value: channel.hpfEnabled ? `${channel.hpfFrequency} Hz` : `${channel.hpfFrequency} Hz (HPF OFF)`, warn: !channel.hpfEnabled };
    if (entry.parameter === 'pan') return { context, label: 'PAN', value: channel.pan === 0 ? 'CENTER' : (channel.pan < 0 ? `L ${Math.abs(channel.pan)}` : `R ${channel.pan}`) };
    if (entry.parameter === 'gateThreshold') return { context, label: 'DYN 1 GATE THR', value: `${channel.gateThreshold} dB` };
    if (entry.parameter === 'compressorThreshold') return { context, label: 'DYN 2 COMP THR', value: `${channel.compressorThreshold} dB` };
    if (entry.parameter === 'ratio') return { context, label: 'DYN 2 RATIO', value: `${channel.ratio.toFixed(1)} : 1` };
    return null;
  }

  function showParameterReadout(entry) {
    const data = entry && entry.custom ? entry : paramReadoutData(entry);
    if (!data) return;
    const bar = document.getElementById('paramReadout');
    if (!bar) return;
    document.getElementById('paramReadoutContext').textContent = data.context || '';
    document.getElementById('paramReadoutLabel').textContent = data.label || '';
    const valueEl = document.getElementById('paramReadoutValue');
    valueEl.textContent = data.value || '';
    valueEl.classList.toggle('warn', Boolean(data.warn));
    bar.classList.add('active');
  }

  function formatDb(db) {
    if (!Number.isFinite(db)) return '-∞ dB';
    return `${db > 0 ? '+' : ''}${db.toFixed(1)} dB`;
  }

  function showChannelFaderReadout(channelId) {
    const channel = assessmentState.channels[channelId];
    const context = `CH ${String(channelId).padStart(2, '0')} ${channel.name}`;
    if (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus) {
      const send = channelSend(channelId);
      showParameterReadout({ custom: true, context, label: `SEND TO MIX ${assessmentState.selectedMixBus}`, value: formatDb(send.levelDb), warn: true });
    } else {
      showParameterReadout({ custom: true, context, label: 'CHANNEL FADER', value: formatDb(channel.faderDb) });
    }
  }

  function showMasterFaderReadout(masterId) {
    showParameterReadout({ custom: true, context: `STEREO MASTER ${masterId}`, label: 'MASTER FADER', value: formatDb(assessmentState.master[masterId].faderDb) });
  }

  function taskProcessLabel(result) {
    if (!result.passed) return 'N/A';

  // Metadati banda EQ (colori Yamaha: LOW rosso, LO-MID ambra, HI-MID verde, HIGH blu)
  const EQ_BANDS = {

  function renderSelectedChannel() {
