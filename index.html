              </div>
              <div class="p-1.5 focus-target ${focusClass('channel', 'gateThreshold')}" data-focus-area="channel" data-focus-param="gateThreshold" data-focus-processor="dyn1" data-focus-channel="${ch.id}">
                <div class="flex justify-between items-baseline"><span class="text-[7px] text-gray-500">THRESHOLD</span><span class="text-led-green text-[12px] font-black leading-none">${dyn1.threshold} dB</span></div>
                <input data-channel-field="gateThreshold" class="w-full accent-led-green mt-0.5" type="range" min="-80" max="0" value="${dyn1.threshold}">
                <div class="h-1 mt-0.5 bg-black rounded overflow-hidden border border-white/10"><div class="h-full bg-led-green" style="width:${gateLevel}%"></div></div>
              </div>
            </div>

            <!-- DYNAMICS 2 (Comp) -->
            <div class="screen-panel flex flex-col">
              <div class="flex items-center justify-between px-2 h-4 bg-white/5 border-b border-white/10">
                <span class="text-[7px] font-black tracking-[0.15em] text-gray-300">DYNAMICS 2 · COMP</span>
                <button data-action="toggle-compressor" class="text-[7px] font-black px-1.5 rounded-sm border ${dyn2.enabled ? 'text-led-amber border-led-amber/60 bg-led-amber/15' : 'text-gray-500 border-white/15'}">${dyn2.enabled ? 'ON' : 'OFF'}</button>
              </div>
              <div class="p-1.5 grid grid-cols-2 gap-2">
                <div class="focus-target ${focusClass('channel', 'compressorThreshold')}" data-focus-area="channel" data-focus-param="compressorThreshold" data-focus-processor="dyn2" data-focus-channel="${ch.id}">
                  <div class="flex justify-between items-baseline"><span class="text-[7px] text-gray-500">THR</span><span class="text-led-amber text-[11px] font-black leading-none">${dyn2.threshold}</span></div>
                  <input data-channel-field="compressorThreshold" class="w-full accent-led-amber mt-0.5" type="range" min="-60" max="0" value="${dyn2.threshold}">
                </div>
                <div class="focus-target ${focusClass('channel', 'ratio')}" data-focus-area="channel" data-focus-param="ratio" data-focus-channel="${ch.id}">
                  <div class="flex justify-between items-baseline"><span class="text-[7px] text-gray-500">RATIO</span><span class="text-led-amber text-[11px] font-black leading-none">${dyn2.ratio}:1</span></div>
                  <input data-channel-field="ratio" class="w-full accent-led-amber mt-0.5" type="range" min="1" max="10" step="0.1" value="${dyn2.ratio}">
                </div>
              </div>
            </div>

            <!-- PAN -->
            <div class="screen-panel flex flex-col flex-grow min-h-0">
              <div class="flex items-center px-2 h-4 bg-white/5 border-b border-white/10"><span class="text-[7px] font-black tracking-[0.2em] text-gray-300">PAN / TO STEREO</span></div>
              <div class="p-1.5 flex-grow flex flex-col justify-center focus-target ${focusClass('channel', 'pan')}" data-focus-area="channel" data-focus-param="pan" data-focus-channel="${ch.id}">
                <div class="flex justify-between items-baseline"><span class="text-[7px] text-gray-500">PAN</span><span class="text-vb-cyan text-[13px] font-black leading-none">${ch.pan === 0 ? 'CENTER' : (ch.pan < 0 ? 'L ' + Math.abs(ch.pan) : 'R ' + ch.pan)}</span></div>
                <input data-channel-field="pan" class="w-full accent-vb-cyan mt-1" type="range" min="-100" max="100" value="${ch.pan}">
                <div class="flex justify-between text-[6px] text-gray-600 mt-0.5"><span>L</span><span>C</span><span>R</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderRouting() {
    return `
      <div class="h-full flex flex-col gap-2">
        <div class="text-[10px] font-bold text-gray-500">INPUT PATCH / OUTPUT PATCH | SELECTED CH ${String(assessmentState.selectedChannel).padStart(2, '0')}</div>
        <div class="grid grid-cols-2 gap-2 flex-grow min-h-0">
          <div class="border border-white/10 bg-black/30 p-2 flex flex-col min-h-0">
            <div class="text-[8px] font-black text-vb-cyan mb-1">INPUT PATCH</div>
            <div class="grid grid-cols-4 gap-1 overflow-y-auto">
              ${Array.from({ length: 32 }, (_, index) => {
                const channelId = index + 1;
                const patch = assessmentState.inputPatch[channelId];
                return `<button data-action="cycle-input-patch" data-channel-id="${channelId}" class="border border-white/5 bg-black/40 p-1 text-left ${assessmentState.selectedChannel === channelId ? 'border-vb-cyan/50' : ''}">
                  <div class="text-[7px] text-gray-500">CH ${String(channelId).padStart(2, '0')}</div>
                  <div class="text-[8px] font-black text-gray-300">${patch.label}</div>
                </button>`;
              }).join('')}
            </div>
          </div>
          <div class="border border-white/10 bg-black/30 p-2 flex flex-col min-h-0">
            <div class="text-[8px] font-black text-led-amber mb-1">OUTPUT PATCH / MIX OUTPUT</div>
            <div class="grid grid-cols-4 gap-1 overflow-y-auto">
              ${Array.from({ length: 16 }, (_, index) => {
                const busId = index + 1;
                const patch = assessmentState.outputPatch[`MIX${busId}`];
                return `<button data-action="cycle-output-patch" data-bus-id="${busId}" class="border border-white/5 bg-black/40 p-1 text-left">
                  <div class="text-[7px] text-gray-500">MIX ${String(busId).padStart(2, '0')}</div>
                  <div class="text-[8px] font-black text-gray-300">${patch.label}</div>
                </button>`;
              }).join('')}
            </div>
            <div class="text-[8px] text-gray-500 mt-2 mb-1">MIX SEND QUICK ASSIGN</div>
            <div class="grid grid-cols-8 gap-[2px]">
              ${Array.from({ length: 16 }, (_, index) => {
                const busId = index + 1;
                const active = selectedChannel().routing[busId] === true;
                return `<button data-route-bus="${busId}" class="border border-white/5 p-1 ${active ? 'bg-vb-cyan/20 border-vb-cyan/50 text-vb-cyan' : 'text-gray-500'} text-[8px] font-black">M${busId}</button>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderMixBus() {
    const activeBus = assessmentState.selectedMixBus;
    return `
       <div class="h-full flex flex-col">
        <div class="flex justify-between items-center text-[10px] font-bold text-gray-500 mb-2">
          <span>SENDS ON FADER / MIX 1-16 ${assessmentState.sendsOnFaderActive ? `| ACTIVE MIX ${activeBus}` : '| SELECT MIX DESTINATION'}</span>
          ${assessmentState.sendsOnFaderActive ? '<button data-action="exit-sends-on-fader" class="px-2 py-1 border border-white/20 text-[8px] text-gray-300">EXIT</button>' : ''}
        </div>
        <div class="grid grid-cols-8 gap-2 flex-grow">
          ${busNames.map((bus, index) => {
            const busId = index + 1;
            const selected = activeBus === busId && assessmentState.sendsOnFaderActive;
            const activeCount = Object.values(assessmentState.channels).filter(channel => channel.sends?.[busId]?.on).length;
            return `
              <button data-action="select-mix-bus" data-mix-bus="${busId}" class="bg-black/40 border ${selected ? 'border-vb-cyan/70 bg-vb-cyan/10' : 'border-white/10'} rounded p-2 flex flex-col items-center">
                <span class="text-[9px] ${selected ? 'text-vb-cyan' : 'text-gray-400'}">${bus}</span>
                <div class="flex-grow w-1 bg-black/80 my-1 relative rounded-full overflow-hidden"><div class="absolute bottom-0 w-full ${activeCount ? 'bg-led-green' : 'bg-gray-800'}" style="height: ${activeCount ? Math.min(90, 20 + activeCount * 4) : 8}%"></div></div>
                <span class="text-[8px] font-mono ${activeCount ? 'text-led-green' : 'text-gray-600'}">${activeCount} ON</span>
              </button>
            `;
          }).join('')}
        </div>
        <div class="mt-2 text-[8px] text-gray-500">In SENDS ON FADER mode, physical channel faders control send level to selected MIX and ON buttons control send on/off.</div>
      </div>
    `;
  }

  function renderScenes() {
    return `
       <div class="h-full flex flex-col gap-4">
        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-white">SCENE MEMORY / STORE / RECALL</span>
          <div class="flex gap-2">
            <button data-scene-action="store" class="px-3 py-1 bg-led-green/20 text-led-green text-[9px] font-bold rounded border border-led-green/40">STORE</button>
            <button data-scene-action="recall" class="px-3 py-1 bg-led-amber/20 text-led-amber text-[9px] font-bold rounded border border-led-amber/40">RECALL</button>
          </div>
        </div>
        <div class="flex-grow overflow-y-auto pr-2 space-y-1">
          ${assessmentState.scenes.map(scene => `
            <button data-scene-id="${scene.id}" class="w-full p-2 border border-white/5 flex justify-between items-center hover:bg-white/5 cursor-pointer ${assessmentState.selectedScene === scene.id ? 'bg-vb-cyan/10 border-vb-cyan/30' : ''}">
              <div class="flex gap-3">
                <span class="text-[10px] font-mono text-gray-500">${scene.number}</span>
                <span class="text-[10px] font-bold text-white">${scene.name}</span>
              </div>
              <span class="text-[8px] text-gray-600">${scene.storedAt ? scene.storedAt.split('T')[1].slice(0, 8) : '--:--:--'}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  const tabRenderers = {
    SELECTED_CH: renderSelectedChannel,
    ROUTING: renderRouting,
    MIX_BUS: renderMixBus,
    SCENES: renderScenes
  };

  function switchTab(tabId) {
    assessmentState.activeTab = tabId;
    const container = document.getElementById('screen-content');
    container.innerHTML = tabRenderers[tabId]();
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('bg-white/10', 'text-vb-cyan');
      if(btn.textContent.includes(tabId.replace('_', ' '))) {
        btn.classList.add('bg-white/10', 'text-vb-cyan');
      }
    });
    bindScreenControls();
    applyFocusHighlight();
  }

  function refreshScreen() {
    switchTab(assessmentState.activeTab);
    refreshHardwareSelection();
  }

  function selectChannel(channelId) {
    assessmentState.selectedChannel = Number(channelId);
    recordAction('selectChannel', { channelId: Number(channelId) });
    refreshScreen();
  }

  function refreshHardwareSelection() {
    document.querySelectorAll('[data-action="select-channel"]').forEach(button => {
      const active = Number(button.dataset.channelId) === assessmentState.selectedChannel;
      button.classList.toggle('bg-vb-cyan/20', active);
      button.classList.toggle('shadow-[0_0_8px_rgba(34,211,238,0.8)]', active);
    });
  }

  function updateFaderReadout(channelId) {
    const state = currentFaderState(channelId);
    const cap = document.querySelector(`[data-action="channel-fader"][data-channel-id="${channelId}"]`);
    const readout = document.querySelector(`[data-fader-value="${channelId}"]`);
    renderFaderTop(cap, state.faderTop);
    if (readout) readout.textContent = Number.isFinite(state.faderDb) ? state.faderDb.toFixed(1) : '-∞';
    const onButton = document.querySelector(`[data-action="toggle-on"][data-channel-id="${channelId}"]`);
    if (onButton) {
      const active = assessmentState.sendsOnFaderActive ? channelSend(channelId)?.on === true : assessmentState.channels[channelId].on === true;
      onButton.classList.toggle('opacity-40', !active);
      onButton.classList.toggle('border-vb-cyan/60', assessmentState.sendsOnFaderActive && active);
      onButton.classList.toggle('border-led-green/50', !assessmentState.sendsOnFaderActive);
    }
  }

  function refreshAllFaders() {
    Object.keys(assessmentState.channels).forEach(channelId => updateFaderReadout(Number(channelId)));
  }

  function updateMasterReadout(masterId) {
    const master = assessmentState.master[masterId];
    const cap = document.querySelector(`[data-action="master-fader"][data-master-id="${masterId}"]`);
    const readout = document.querySelector(`[data-master-value="${masterId}"]`);
    const button = document.querySelector(`[data-action="master-on"][data-master-id="${masterId}"]`);
    renderFaderTop(cap, master.faderTop);
    if (readout) readout.textContent = master.faderDb.toFixed(1);
    if (button) {
      button.classList.toggle('opacity-35', !master.on);
      button.classList.toggle('text-led-red', master.on);
      button.classList.toggle('text-gray-600', !master.on);
      button.classList.toggle('border-led-red/50', master.on);
      button.classList.toggle('border-white/10', !master.on);
      button.classList.toggle('shadow-[0_0_8px_rgba(239,68,68,0.18)]', master.on);
    }
  }

  // Sincronizza gli input "gemelli" (slider + campo numerico) di uno stesso
  // parametro, senza toccare quello che l'utente sta usando in quel momento:
  // così si può digitare o trascinare un valore preciso senza che il pannello
  // si rigeneri e rubi il focus a metà (era la causa di D1 e D2).
  function syncPairedInputs(selector, newValue, activeEl) {
    document.querySelectorAll(selector).forEach(input => {
      if (input !== activeEl && String(input.value) !== String(newValue)) input.value = newValue;
    });
  }

  function updateChannelField(field, value, activeEl) {
    const channel = selectedChannel();
    const handler = parameterHandlers[field];
    if (handler) handler.write(channel, handler.clamp(Number(value)));
    else channel[field] = Number(value);
    syncPairedInputs(`[data-channel-field="${field}"]`, channel[field], activeEl);
    showParameterReadout({ area: 'channel', parameter: field, channelId: channel.id });
    recordAction('processingChange', { channelId: channel.id, field, value: channel[field] });
  }

  function updateEqField(path, value, activeEl) {
    const channel = selectedChannel();
    const [band, field] = path.split('.');
    const handler = eqParameterHandlers[field];
    channel.eq[band][field] = handler ? handler.clamp(Number(value)) : Number(value);
    syncPairedInputs(`[data-eq-field="${band}.${field}"]`, channel.eq[band][field], activeEl);
    updateEqCurve(channel);
    showParameterReadout({ area: 'eq', parameter: field, band, channelId: channel.id });
    recordAction('eqChange', { channelId: channel.id, band, field, value: channel.eq[band][field] });
  }

  // Aggiorna la curva EQ a schermo senza rigenerare l'intero pannello.
  function updateEqCurve(channel) {
    const svg = document.getElementById('eqCurveSvg');
    if (!svg) return;
    const path = svg.querySelector('.eq-curve-path');
    if (path) path.setAttribute('d', eqPath(channel));
    svg.querySelectorAll('.eq-curve-node').forEach((node, index) => {
      const band = Object.values(channel.eq)[index];
      if (band) node.setAttribute('cy', clamp(75 - band.gain * 4, 18, 132));
    });
  }

  function toggleRoute(busId) {
    const channel = selectedChannel();
    channel.routing[busId] = !channel.routing[busId];
    if (channel.sends?.[busId]) channel.sends[busId].on = channel.routing[busId];
    recordAction('routeToggle', { channelId: channel.id, busId: Number(busId), active: channel.routing[busId] });
    refreshScreen();
  }

  function selectMixBus(busId) {
    assessmentState.selectedMixBus = Number(busId);
    assessmentState.sendsOnFaderActive = true;
    recordAction('mixBusSelect', { busId: assessmentState.selectedMixBus, sendsOnFaderActive: true });
    refreshAllFaders();
    refreshScreen();
  }

  function exitSendsOnFader() {
    assessmentState.sendsOnFaderActive = false;
    recordAction('sendsOnFaderExit', { previousBusId: assessmentState.selectedMixBus });
    refreshAllFaders();
    refreshScreen();
  }

  function cycleInputPatch(channelId) {
    const patch = assessmentState.inputPatch[channelId];
    const nextType = patch.sourceType === 'DANTE' ? 'INPUT' : patch.sourceType === 'INPUT' ? 'USB' : 'DANTE';
    patch.sourceType = nextType;
    patch.label = `${nextType} ${patch.portId}`;
    recordAction('inputPatchChange', { channelId: Number(channelId), ...patch });
    refreshScreen();
  }

  function cycleOutputPatch(busId) {
    const key = `MIX${busId}`;
    const patch = assessmentState.outputPatch[key];
    const nextType = patch.destinationType === 'OMNI' ? 'DANTE' : patch.destinationType === 'DANTE' ? 'SLOT' : 'OMNI';
    patch.destinationType = nextType;
    patch.label = `${nextType} ${patch.portId}`;
    recordAction('outputPatchChange', { busId: Number(busId), ...patch });
    refreshScreen();
  }

  function toggleChannelFlag(flag) {
    const channel = selectedChannel();
    channel[flag] = !channel[flag];
    if (flag === 'gateEnabled') channel.dyn1.enabled = channel[flag];
    if (flag === 'compressorEnabled') channel.dyn2.enabled = channel[flag];
    recordAction('processingToggle', { channelId: channel.id, flag, active: channel[flag] });
    refreshScreen();
  }

  function updateUserDefinedKeys() {
    document.querySelectorAll('[data-action="user-defined-key"]').forEach(button => {
      const keyId = Number(button.dataset.keyId);
      const active = assessmentState.userDefinedKeys[keyId]?.active === true;
      const led = document.querySelector(`[data-udk-led="${keyId}"]`);
      button.classList.toggle('border-led-red/50', active);
      button.classList.toggle('shadow-[0_0_7px_rgba(239,68,68,0.22)]', active);
      if (led) {
        led.classList.toggle('bg-led-red', active);
        led.classList.toggle('bg-[#2a0b0b]', !active);
        led.classList.toggle('shadow-[0_0_6px_rgba(239,68,68,0.8)]', active);
      }
    });
  }

  function toggleUserDefinedKey(keyId) {
    const key = assessmentState.userDefinedKeys[keyId];
    if (!key) return;
    key.active = !key.active;
    recordAction('userDefinedKeyPress', { keyId, active: key.active });
    updateUserDefinedKeys();
  }

  function updateEqBandButtons() {
    const focusedBand = assessmentState.focus.area === 'eq' && assessmentState.focus.band ? assessmentState.focus.band : null;
    document.querySelectorAll('[data-action="eq-band-select"]').forEach(button => {
      const active = button.dataset.eqBand === focusedBand;
      button.classList.toggle('border-vb-cyan/60', active);
      button.classList.toggle('text-vb-cyan', active);
      button.classList.toggle('shadow-[0_0_7px_rgba(34,211,238,0.22)]', active);
    });
  }

  function selectEqBand(band) {
    setFocus({
      area: 'eq',
      parameter: 'gain',
      channelId: assessmentState.selectedChannel,
      band
    });
    recordAction('eqBandSelect', { channelId: assessmentState.selectedChannel, band });
    // Rigenera il touchscreen così i parametri della banda selezionata compaiono
    // (la SELECTED CHANNEL VIEW mostra una banda per volta, come sul QL5 reale).
    if (assessmentState.activeTab === 'SELECTED_CH') refreshScreen();
    else updateEqBandButtons();
  }

  function bindScreenControls() {
    const screenContainer = document.getElementById('screen-content');
    if (screenContainer && !screenContainer.dataset.focusDelegated) {
      screenContainer.dataset.focusDelegated = 'true';
      screenContainer.addEventListener('mousedown', event => {
        const target = event.target.closest('[data-focus-param]');
        if (target) setFocus(focusFromElement(target));
      }, true);
    }
    document.querySelectorAll('[data-focus-param]').forEach(element => {
      element.addEventListener('click', event => {
        event.stopPropagation();
        setFocus(focusFromElement(element));
      });
    });
    // start-test / check-task / export-json / export-pdf ora vivono nel pannello
    // sinistro (fuori da #screen-content): il loro binding è in bindControlPanel().
    document.querySelectorAll('[data-action="screen-select-channel"]').forEach(button => {
      button.addEventListener('click', () => selectChannel(button.dataset.channelId));
    });
    document.querySelectorAll('[data-channel-field]').forEach(input => {
      input.addEventListener('input', () => updateChannelField(input.dataset.channelField, input.value, input));
      input.addEventListener('change', () => refreshScreen());
    });
    document.querySelectorAll('[data-eq-field]').forEach(input => {
      input.addEventListener('input', () => updateEqField(input.dataset.eqField, input.value, input));
      input.addEventListener('change', () => refreshScreen());
    });
    document.querySelectorAll('[data-route-bus]').forEach(button => {
      button.addEventListener('click', () => toggleRoute(Number(button.dataset.routeBus)));
    });
    document.querySelectorAll('[data-action="eq-band-select"]').forEach(button => {
      button.addEventListener('click', () => selectEqBand(button.dataset.eqBand));
    });
    document.querySelectorAll('[data-action="select-mix-bus"]').forEach(button => {
      button.addEventListener('click', () => selectMixBus(Number(button.dataset.mixBus)));
    });
    document.querySelectorAll('[data-action="exit-sends-on-fader"]').forEach(button => {
      button.addEventListener('click', exitSendsOnFader);
    });
    document.querySelectorAll('[data-action="cycle-input-patch"]').forEach(button => {
      button.addEventListener('click', () => cycleInputPatch(Number(button.dataset.channelId)));
    });
    document.querySelectorAll('[data-action="cycle-output-patch"]').forEach(button => {
      button.addEventListener('click', () => cycleOutputPatch(Number(button.dataset.busId)));
    });
    document.querySelectorAll('[data-action="toggle-hpf"]').forEach(button => {
      button.addEventListener('click', () => toggleChannelFlag('hpfEnabled'));
    });
    document.querySelectorAll('[data-action="toggle-gate"]').forEach(button => {
      button.addEventListener('click', () => toggleChannelFlag('gateEnabled'));
    });
    document.querySelectorAll('[data-action="toggle-compressor"]').forEach(button => {
      button.addEventListener('click', () => toggleChannelFlag('compressorEnabled'));
    });
    document.querySelectorAll('[data-scene-id]').forEach(button => {
      button.addEventListener('click', () => {
        assessmentState.selectedScene = Number(button.dataset.sceneId);
        recordAction('sceneSelect', { sceneId: assessmentState.selectedScene });
        refreshScreen();
      });
    });
    document.querySelectorAll('[data-scene-action="store"]').forEach(button => {
      button.addEventListener('click', () => {
        const scene = assessmentState.scenes.find(item => item.id === assessmentState.selectedScene);
        scene.snapshot = cloneConsoleSnapshot();
        scene.storedAt = nowStamp();
        recordAction('sceneStore', { sceneId: scene.id });
        refreshScreen();
      });
    });
    document.querySelectorAll('[data-scene-action="recall"]').forEach(button => {
      button.addEventListener('click', () => {
        const scene = assessmentState.scenes.find(item => item.id === assessmentState.selectedScene);
        if (scene.snapshot) {
          assessmentState.channels = JSON.parse(JSON.stringify(scene.snapshot.channels));
          assessmentState.selectedChannel = scene.snapshot.selectedChannel;
          if (scene.snapshot.master) assessmentState.master = JSON.parse(JSON.stringify(scene.snapshot.master));
          if (scene.snapshot.inputPatch) assessmentState.inputPatch = JSON.parse(JSON.stringify(scene.snapshot.inputPatch));
          if (scene.snapshot.outputPatch) assessmentState.outputPatch = JSON.parse(JSON.stringify(scene.snapshot.outputPatch));
          assessmentState.selectedMixBus = scene.snapshot.selectedMixBus || null;
          assessmentState.sendsOnFaderActive = Boolean(scene.snapshot.sendsOnFaderActive);
        }
        recordAction('sceneRecall', { sceneId: scene.id, hadSnapshot: Boolean(scene.snapshot) });
        refreshAllFaders();
        Object.keys(assessmentState.master).forEach(masterId => updateMasterReadout(masterId));
        refreshScreen();
      });
    });
  }

  document.querySelectorAll('[data-action="select-channel"]').forEach(button => {
    button.addEventListener('click', () => selectChannel(button.dataset.channelId));
  });

  document.querySelectorAll('[data-action="cue-channel"]').forEach(button => {
    button.addEventListener('click', () => {
      const channelId = Number(button.dataset.channelId);
      assessmentState.channels[channelId].cue = !assessmentState.channels[channelId].cue;
      recordAction('cueToggle', { channelId, active: assessmentState.channels[channelId].cue });
      button.classList.toggle('bg-amber-500/20', assessmentState.channels[channelId].cue);
    });
  });

  document.querySelectorAll('[data-action="toggle-on"]').forEach(button => {
    button.addEventListener('click', () => {
      const channelId = Number(button.dataset.channelId);
      if (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus) {
        const send = channelSend(channelId);
        send.on = !send.on;
        assessmentState.channels[channelId].routing[assessmentState.selectedMixBus] = send.on;
        recordAction('sendOnToggle', { channelId, busId: assessmentState.selectedMixBus, active: send.on });
        recordAction('routeToggle', { channelId, busId: assessmentState.selectedMixBus, active: send.on });
        updateFaderReadout(channelId);
        if (assessmentState.activeTab === 'MIX_BUS') refreshScreen();
        return;
      }
      assessmentState.channels[channelId].on = !assessmentState.channels[channelId].on;
      recordAction('onToggle', { channelId, active: assessmentState.channels[channelId].on });
      button.classList.toggle('opacity-40', !assessmentState.channels[channelId].on);
    });
  });

  document.querySelectorAll('[data-action="master-on"]').forEach(button => {
    button.addEventListener('click', () => {
      const masterId = button.dataset.masterId;
      assessmentState.master[masterId].on = !assessmentState.master[masterId].on;
      recordAction('masterOnToggle', { masterId, active: assessmentState.master[masterId].on });
      updateMasterReadout(masterId);
    });
  });

  document.querySelectorAll('[data-action="user-defined-key"]').forEach(button => {
    button.addEventListener('click', () => {
      toggleUserDefinedKey(Number(button.dataset.keyId));
    });
  });

  document.querySelectorAll('[data-action="channel-fader"]').forEach(cap => {
    cap.addEventListener('mousedown', function(e) {
      const channelId = Number(this.dataset.channelId);
      const startY = e.clientY;
      const startTop = (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus)
        ? channelSend(channelId).faderTop
        : assessmentState.channels[channelId].faderTop;
      const track = this.parentElement;
      const onMove = (moveEvent) => {
        const delta = ((moveEvent.clientY - startY) / track.offsetHeight) * 100;
        const top = clamp(startTop + delta, 0, 100);
        if (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus) {
          const send = channelSend(channelId);
          send.faderTop = top;
          send.levelDb = faderTopToDb(top);
        } else {
          assessmentState.channels[channelId].faderTop = top;
          assessmentState.channels[channelId].faderDb = faderTopToDb(top);
        }
        updateFaderReadout(channelId);
        showChannelFaderReadout(channelId);
        if (assessmentState.selectedChannel === channelId && assessmentState.activeTab === 'SELECTED_CH') switchTab('SELECTED_CH');
      };
      const onUp = () => {
        if (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus) {
          const send = channelSend(channelId);
          recordAction('sendFaderMove', { channelId, busId: assessmentState.selectedMixBus, levelDb: send.levelDb });
        } else {
          recordAction('faderMove', { channelId, faderDb: assessmentState.channels[channelId].faderDb });
        }
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  });

  document.querySelectorAll('[data-action="master-fader"]').forEach(cap => {
    cap.addEventListener('mousedown', function(e) {
      const masterId = this.dataset.masterId;
      const startY = e.clientY;
      const startTop = assessmentState.master[masterId].faderTop;
      const track = this.parentElement;
      const onMove = (moveEvent) => {
        const delta = ((moveEvent.clientY - startY) / track.offsetHeight) * 100;
        const top = clamp(startTop + delta, 0, 100);
        assessmentState.master[masterId].faderTop = top;
        assessmentState.master[masterId].faderDb = faderTopToDb(top);
        updateMasterReadout(masterId);
        showMasterFaderReadout(masterId);
      };
      const onUp = () => {
        recordAction('masterFaderMove', { masterId, faderDb: assessmentState.master[masterId].faderDb });
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  });

  // Click-to-jump sul binario: clicca un punto del percorso (non il cursore
  // stesso, quello resta trascinabile come prima) e il fader si sposta subito
  // lì, senza dover trascinare tutto il tragitto a mano.
  document.querySelectorAll('.fader-slot').forEach(track => {
    const cap = track.querySelector('[data-action="channel-fader"], [data-action="master-fader"]');
    if (!cap) return;
    track.addEventListener('click', event => {
      if (event.target !== track) return;
      const rect = track.getBoundingClientRect();
      const insetPercent = rect.height > 0 ? (cap.offsetHeight / rect.height) * 100 : 0;
      const usablePercent = Math.max(1, 100 - insetPercent);
      const clickPercent = ((event.clientY - rect.top) / rect.height) * 100;
      const logicalTop = clamp((clickPercent / usablePercent) * 100, 0, 100);
      if (cap.dataset.action === 'channel-fader') {
        const channelId = Number(cap.dataset.channelId);
        if (assessmentState.sendsOnFaderActive && assessmentState.selectedMixBus) {
          const send = channelSend(channelId);
          send.faderTop = logicalTop;
          send.levelDb = faderTopToDb(logicalTop);
          recordAction('sendFaderMove', { channelId, busId: assessmentState.selectedMixBus, levelDb: send.levelDb });
        } else {
          assessmentState.channels[channelId].faderTop = logicalTop;
          assessmentState.channels[channelId].faderDb = faderTopToDb(logicalTop);
          recordAction('faderMove', { channelId, faderDb: assessmentState.channels[channelId].faderDb });
        }
        updateFaderReadout(channelId);
        showChannelFaderReadout(channelId);
        if (assessmentState.selectedChannel === channelId && assessmentState.activeTab === 'SELECTED_CH') switchTab('SELECTED_CH');
      } else {
        const masterId = cap.dataset.masterId;
        assessmentState.master[masterId].faderTop = logicalTop;
        assessmentState.master[masterId].faderDb = faderTopToDb(logicalTop);
        recordAction('masterFaderMove', { masterId, faderDb: assessmentState.master[masterId].faderDb });
        updateMasterReadout(masterId);
        showMasterFaderReadout(masterId);
      }
    });
  });

  document.querySelectorAll('.touch-turn-wheel').forEach(wheel => {
    wheel.addEventListener('mousedown', function(e) {
      const startY = e.clientY;
      const startRot = parseInt(this.getAttribute('data-rot') || '0');
      let lastResult = null;
      let lastDelta = 0;
      const onMove = (moveEvent) => {
        const delta = startY - moveEvent.clientY;
        const incrementalDelta = delta - lastDelta;
        lastDelta = delta;
        const newRot = startRot + delta;
        this.style.transform = `rotate(${newRot}deg)`;
        this.setAttribute('data-rot', newRot);
        lastResult = adjustFocusedParameter(incrementalDelta);
        if (assessmentState.activeTab === 'SELECTED_CH') switchTab('SELECTED_CH');
      };
      const onUp = () => {
        const result = lastResult || adjustFocusedParameter(0);
        recordAction('touchTurnAdjust', { ...result.target, value: result.value });
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  });

  document.querySelectorAll('.knob').forEach(knob => {
    knob.addEventListener('mousedown', function(e) {
      const selected = selectedChannel();
      const knobType = this.dataset.knob;
      const eqBandKnob = this.dataset.eqBand;
      const eqControlKnob = this.dataset.eqControl;
      const startY = e.clientY;
      const startRot = parseInt(this.getAttribute('data-rot') || '0');
      const startValue = selected[knobType] ?? 0;
      const startEqFocus = { ...assessmentState.focus };
      const startEqBand = startEqFocus.area === 'eq' && startEqFocus.band ? startEqFocus.band : (eqBandKnob || (eqControlKnob ? 'low' : null));
      const startEqParam = eqControlKnob || (startEqFocus.area === 'eq' && startEqFocus.parameter ? startEqFocus.parameter : 'gain');
      const startEqValue = startEqBand ? selected.eq[startEqBand][startEqParam] : null;
      const onMove = (moveEvent) => {
        const delta = startY - moveEvent.clientY;
        const newRot = startRot + delta;
        this.style.transform = `rotate(${newRot}deg)`;
        this.setAttribute('data-rot', newRot);
        if ((eqBandKnob || eqControlKnob) && startEqBand) {
          applyEqParameterDelta(startEqParam, startEqBand, selected, delta, startEqValue);
          showParameterReadout({ area: 'eq', parameter: startEqParam, band: startEqBand, channelId: selected.id });
        } else {
          applyParameterDelta(knobType, selected, delta, startValue);
          showParameterReadout({ area: 'channel', parameter: knobType, channelId: selected.id });
        }
        if (assessmentState.activeTab === 'SELECTED_CH') switchTab('SELECTED_CH');
      };
      const onUp = () => {
        if ((eqBandKnob || eqControlKnob) && startEqBand) {
          recordAction('knobAdjust', { channelId: selected.id, knobType: 'eq', band: startEqBand, parameter: startEqParam, value: selected.eq[startEqBand][startEqParam] });
        } else {
          recordAction('knobAdjust', { channelId: selected.id, knobType, value: selected[knobType] });
        }
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  });

  // Lente di ingrandimento testo (adattata dal simulatore grandMA3): mostra in
  // grande l'etichetta del controllo sotto il mouse o con focus da tastiera.
  // Il testo è derivato dinamicamente (canale selezionato + funzione del
  // controllo) invece di annotare a mano ogni singolo tasto/manopola.
  const magnifierState = { enabled: true, target: null };

  const magnifierSelector = [
    '[data-action="select-channel"]', '[data-action="cue-channel"]', '[data-action="toggle-on"]',
    '[data-action="master-on"]', '.knob[data-knob]', '[data-eq-band]', '[data-eq-control]',
    '[data-action="user-defined-key"]', '[data-action="select-mix-bus"]', '[data-scene-id]',
    '[data-action="toggle-hpf"]', '[data-action="toggle-gate"]', '[data-action="toggle-compressor"]',
    '[data-route-bus]', '[data-action="cycle-input-patch"]', '[data-action="cycle-output-patch"]',
    '.touch-turn-wheel'
  ].join(',');

  function getMagnifierTarget(origin) {
    if (!(origin instanceof Element)) return null;
    const target = origin.closest(magnifierSelector);
    return target?.closest('#hoverMagnifier') ? null : target;
  }

  function getMagnifierText(target) {
    const channelId = target.dataset.channelId ? Number(target.dataset.channelId) : null;
    const channelName = channelId ? (assessmentState.channels[channelId]?.name || `CH${channelId}`) : null;
    if (target.matches('[data-action="select-channel"]')) return `Channel ${channelId} - ${channelName} - SEL (select for Selected Channel section)`;
    if (target.matches('[data-action="cue-channel"]')) return `Channel ${channelId} - ${channelName} - CUE (solo/PFL)`;
    if (target.matches('[data-action="toggle-on"]')) return `Channel ${channelId} - ${channelName} - ON/OFF`;
    if (target.matches('[data-action="master-on"]')) return `Master ${target.dataset.masterId} - ON/OFF`;
    if (target.matches('.knob[data-knob]')) {
      const labels = { gain: 'Gain', pan: 'Pan', hpfFrequency: 'HPF Frequency', gateThreshold: 'Dynamics 1 (Gate) Threshold', compressorThreshold: 'Dynamics 2 (Compressor) Threshold', ratio: 'Compressor Ratio' };
      const selected = selectedChannel();
      return `Selected Channel (${selected.name}) - ${labels[target.dataset.knob] || target.dataset.knob}`;
    }
    if (target.matches('[data-eq-band]')) return `EQ Band Select - ${target.dataset.eqBand}`;
    if (target.matches('[data-eq-control]')) return `EQ Encoder - ${target.dataset.eqControl.toUpperCase()} (acts on the selected band)`;
    if (target.matches('[data-action="user-defined-key"]')) return `User Defined Key ${target.dataset.keyId} (not assigned in this assessment)`;
    if (target.matches('[data-action="select-mix-bus"]')) return `Select MIX ${target.dataset.mixBus} as Sends on Fader destination`;
    if (target.matches('[data-scene-id]')) return `Scene ${target.dataset.sceneId}`;
    if (target.matches('[data-action="toggle-hpf"]')) return 'Toggle HPF (High Pass Filter) on selected channel';
    if (target.matches('[data-action="toggle-gate"]')) return 'Toggle Dynamics 1 (Gate) on selected channel';
    if (target.matches('[data-action="toggle-compressor"]')) return 'Toggle Dynamics 2 (Compressor) on selected channel';
    if (target.matches('[data-route-bus]')) return `Quick send assign - MIX ${target.dataset.routeBus}`;
    if (target.matches('[data-action="cycle-input-patch"]')) return `Input Patch - Channel ${target.dataset.channelId} (click to cycle source)`;
    if (target.matches('[data-action="cycle-output-patch"]')) return `Output Patch - MIX ${target.dataset.busId} (click to cycle destination)`;
    if (target.matches('.touch-turn-wheel')) return 'Touch and Turn - edits the currently focused parameter';
    return target.getAttribute('aria-label') || target.textContent?.trim() || '';
  }

  function getMagnifierCategory(target) {
    if (target.matches('.knob, .touch-turn-wheel')) return 'ENCODER';
    if (target.matches('[data-scene-id]')) return 'SCENE';
    if (target.matches('[data-action="user-defined-key"]')) return 'UDK';
    return 'KEY';
  }

  function positionMagnifier(clientX, clientY) {
    const magnifier = document.getElementById('hoverMagnifier');
    const offset = 16;
    const margin = 8;
    const bounds = magnifier.getBoundingClientRect();
    let left = clientX + offset;
    let top = clientY + offset;
    if (left + bounds.width > window.innerWidth - margin) left = clientX - bounds.width - offset;
    if (top + bounds.height > window.innerHeight - margin) top = clientY - bounds.height - offset;
    magnifier.style.left = `${Math.max(margin, left)}px`;
    magnifier.style.top = `${Math.max(margin, top)}px`;
  }

  function showMagnifier(target, clientX, clientY) {
    if (!magnifierState.enabled) return;
    const text = getMagnifierText(target);
    if (!text) return hideMagnifier();
    magnifierState.target = target;
    document.getElementById('hoverMagnifierCategory').textContent = getMagnifierCategory(target);
    document.getElementById('hoverMagnifierText').textContent = text;
    const magnifier = document.getElementById('hoverMagnifier');
    magnifier.classList.add('visible');
    magnifier.setAttribute('aria-hidden', 'false');
    if (clientX == null) {
      const rect = target.getBoundingClientRect();
      positionMagnifier(rect.right, rect.top);
    } else positionMagnifier(clientX, clientY);
  }

  function hideMagnifier() {
    magnifierState.target = null;
    const magnifier = document.getElementById('hoverMagnifier');
    magnifier.classList.remove('visible');
    magnifier.setAttribute('aria-hidden', 'true');
  }

  function initializeMagnifier() {
    const toggle = document.getElementById('magToggle');
    toggle.addEventListener('click', () => {
      magnifierState.enabled = !magnifierState.enabled;
      toggle.textContent = magnifierState.enabled ? 'MAG ON' : 'MAG OFF';
      toggle.setAttribute('aria-pressed', String(magnifierState.enabled));
      if (!magnifierState.enabled) hideMagnifier();
    });
    document.addEventListener('mouseover', event => {
      const target = getMagnifierTarget(event.target);
      if (target) showMagnifier(target, event.clientX, event.clientY);
    });
    // Il mousemove è il driver principale: ad ogni movimento riacquisisce
    // l'elemento sotto il cursore. Così la lente resta affidabile anche dopo
    // che un click rigenera il touchscreen (l'elemento vecchio viene sostituito
    // e il target di prima resta "staccato" dal DOM: senza questo, la lente
    // restava congelata finché non si passava su un elemento diverso).
    document.addEventListener('mousemove', event => {
      if (!magnifierState.enabled) return;
      const target = getMagnifierTarget(event.target);
      if (!target) {
        if (magnifierState.target) hideMagnifier();
        return;
      }
      if (target !== magnifierState.target) showMagnifier(target, event.clientX, event.clientY);
      else positionMagnifier(event.clientX, event.clientY);
    });
    document.addEventListener('mouseout', event => {
      // Nasconde solo quando il puntatore lascia davvero la finestra;
      // gli spostamenti tra elementi li gestisce il mousemove qui sopra.
      if (!event.relatedTarget) hideMagnifier();
    });
    document.addEventListener('focusin', event => {
      const target = getMagnifierTarget(event.target);
      if (target) showMagnifier(target, null, null);
    });
    document.addEventListener('focusout', event => {
      if (event.target === magnifierState.target) hideMagnifier();
    });
  }

  initState();
  Object.keys(assessmentState.channels).forEach(channelId => updateFaderReadout(Number(channelId)));
  Object.keys(assessmentState.master).forEach(masterId => updateMasterReadout(masterId));
  updateUserDefinedKeys();
  refreshHardwareSelection();
  renderControlPanel();
  switchTab('SELECTED_CH');
  initializeMagnifier();
</script>
<div class="hover-magnifier" id="hoverMagnifier" role="tooltip" aria-hidden="true">
  <span class="hover-magnifier-category" id="hoverMagnifierCategory">CONTROL</span>
  <strong class="hover-magnifier-text" id="hoverMagnifierText"></strong>
</div>
</body></html>
